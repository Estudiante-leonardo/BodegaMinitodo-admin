spring.application.name=BodegaLeoncito

# PostgreSQL / Supabase configuration
# Configura estas variables de entorno en Render con los valores de tu proyecto Supabase
spring.datasource.url=jdbc:postgresql://${SUPABASE_DB_HOST:localhost}:${SUPABASE_DB_PORT:5432}/${SUPABASE_DB_NAME:bodega_leoncito}
spring.datasource.username=${SUPABASE_DB_USER:postgres}
spring.datasource.password=${SUPABASE_DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=false

# Puerto: Render asigna la variable PORT automaticamente
server.port=${PORT:8081}
